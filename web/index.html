<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduAttend · API Tester</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111419;
      --surface2: #1a1f28;
      --border: #252c38;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --green: #00ff88;
      --red: #ff4466;
      --yellow: #ffd600;
      --text: #e8edf5;
      --text-dim: #5a6478;
      --text-mid: #8b95a8;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid noise background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      padding: 28px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 12, 16, 0.9);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 800;
      color: white;
      font-family: var(--mono);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 89px);
    }

    /* Sidebar */
    aside {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
      background: var(--surface);
    }

    .sidebar-section {
      margin-bottom: 6px;
    }

    .sidebar-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px 6px;
    }

    .service-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 6px;
      font-weight: 400;
    }

    .endpoint-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 20px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }

    .endpoint-btn:hover {
      background: var(--surface2);
    }

    .endpoint-btn.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    .method-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 42px;
      text-align: center;
    }

    .GET {
      background: rgba(0, 229, 255, 0.12);
      color: var(--accent);
    }

    .POST {
      background: rgba(0, 255, 136, 0.12);
      color: var(--green);
    }

    .PUT {
      background: rgba(255, 214, 0, 0.12);
      color: var(--yellow);
    }

    .DELETE {
      background: rgba(255, 68, 102, 0.12);
      color: var(--red);
    }

    .endpoint-name {
      font-size: 13px;
      color: var(--text-mid);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .endpoint-btn.active .endpoint-name {
      color: var(--text);
    }

    /* Main */
    main {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    /* Config bar */
    .config-bar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-wrap: wrap;
    }

    .config-bar label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-bar input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      outline: none;
      flex: 1;
      min-width: 240px;
      transition: border-color 0.2s;
    }

    .config-bar input:focus {
      border-color: var(--accent);
    }

    .token-input {
      flex: 2;
      min-width: 320px !important;
    }

    /* Content area */
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .panel {
      overflow-y: auto;
      padding: 28px;
      border-right: 1px solid var(--border);
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-title {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form fields */
    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-mid);
      margin-bottom: 6px;
      display: block;
    }

    .field-required {
      color: var(--red);
      margin-left: 2px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.08);
    }

    textarea {
      min-height: 100px;
    }

    select option {
      background: var(--surface2);
    }

    /* URL display */
    .url-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 20px;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .url-method {
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
    }

    /* Send button */
    .btn-send {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), #0099bb);
      color: #000;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-send:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-send:active {
      transform: translateY(0);
    }

    .btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Response panel */
    .response-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .status-badge {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 6px;
    }

    .status-2xx {
      background: rgba(0, 255, 136, 0.15);
      color: var(--green);
      border: 1px solid rgba(0, 255, 136, 0.3);
    }

    .status-4xx {
      background: rgba(255, 68, 102, 0.15);
      color: var(--red);
      border: 1px solid rgba(255, 68, 102, 0.3);
    }

    .status-5xx {
      background: rgba(255, 68, 102, 0.15);
      color: var(--red);
      border: 1px solid rgba(255, 68, 102, 0.3);
    }

    .status-err {
      background: rgba(255, 214, 0, 0.15);
      color: var(--yellow);
      border: 1px solid rgba(255, 214, 0, 0.3);
    }

    .response-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .response-body {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
      max-height: calc(100vh - 340px);
      overflow-y: auto;
    }

    .response-body .json-key {
      color: var(--accent);
    }

    .response-body .json-string {
      color: var(--green);
    }

    .response-body .json-number {
      color: var(--yellow);
    }

    .response-body .json-bool {
      color: #ff9c7a;
    }

    .response-body .json-null {
      color: var(--text-dim);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 12px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 13px;
    }

    .empty-state .icon {
      font-size: 36px;
      opacity: 0.3;
    }

    /* Token copy */
    .token-copy-area {
      margin-top: 12px;
      background: var(--surface2);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 8px;
      padding: 12px;
    }

    .token-copy-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .token-copy-value {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-mid);
      word-break: break-all;
      cursor: pointer;
    }

    .btn-copy {
      margin-top: 8px;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.2);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-copy:hover {
      background: rgba(0, 229, 255, 0.2);
    }

    /* Loading spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Service colors */
    .svc-auth {
      --svc: #7c3aed;
    }

    .svc-user {
      --svc: #00e5ff;
    }

    .svc-att {
      --svc: #00ff88;
    }

    .svc-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--svc);
      flex-shrink: 0;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .info-box {
      background: rgba(0, 229, 255, 0.05);
      border: 1px solid rgba(0, 229, 255, 0.15);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-mid);
      margin-bottom: 16px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <div class="logo-icon">EA</div>
      <div>
        <div class="logo-text">Edu<span>Attend</span></div>
      </div>
    </div>
    <div class="header-badge">API TESTER v1.0 · Flask Microservices</div>
  </header>

  <div class="app">
    <!-- Sidebar -->
    <aside>
      <!-- Auth -->
      <div class="sidebar-section svc-auth">
        <div class="sidebar-label"><span class="svc-dot"
            style="background:#7c3aed;display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;"></span>Auth
          Service :8001</div>
        <button class="endpoint-btn" data-id="health-auth" onclick="selectEndpoint(this)">
          <span class="method-badge GET">GET</span>
          <span class="endpoint-name">/health</span>
        </button>
        <button class="endpoint-btn" data-id="login" onclick="selectEndpoint(this)">
          <span class="method-badge POST">POST</span>
          <span class="endpoint-name">/auth/login</span>
        </button>
        <button class="endpoint-btn" data-id="refresh" onclick="selectEndpoint(this)">
          <span class="method-badge POST">POST</span>
          <span class="endpoint-name">/auth/refresh</span>
        </button>
        <button class="endpoint-btn" data-id="logout" onclick="selectEndpoint(this)">
          <span class="method-badge POST">POST</span>
          <span class="endpoint-name">/auth/logout</span>
        </button>
      </div>

      <div class="divider" style="margin:4px 20px;"></div>

      <!-- Users -->
      <div class="sidebar-section svc-user">
        <div class="sidebar-label"><span class="svc-dot"
            style="background:#00e5ff;display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;"></span>User
          Service :8002</div>
        <button class="endpoint-btn" data-id="health-user" onclick="selectEndpoint(this)">
          <span class="method-badge GET">GET</span>
          <span class="endpoint-name">/health</span>
        </button>
        <button class="endpoint-btn" data-id="list-users" onclick="selectEndpoint(this)">
          <span class="method-badge GET">GET</span>
          <span class="endpoint-name">/users</span>
        </button>
        <button class="endpoint-btn" data-id="create-user" onclick="selectEndpoint(this)">
          <span class="method-badge POST">POST</span>
          <span class="endpoint-name">/users</span>
        </button>
        <button class="endpoint-btn" data-id="get-user" onclick="selectEndpoint(this)">
          <span class="method-badge GET">GET</span>
          <span class="endpoint-name">/users/{id}</span>
        </button>
        <button class="endpoint-btn" data-id="update-user" onclick="selectEndpoint(this)">
          <span class="method-badge PUT">PUT</span>
          <span class="endpoint-name">/users/{id}</span>
        </button>
        <button class="endpoint-btn" data-id="update-profile" onclick="selectEndpoint(this)">
          <span class="method-badge PUT">PUT</span>
          <span class="endpoint-name">/users/{id}/profile</span>
        </button>
        <button class="endpoint-btn" data-id="assign-role" onclick="selectEndpoint(this)">
          <span class="method-badge PUT">PUT</span>
          <span class="endpoint-name">/users/{id}/role</span>
        </button>
      </div>

      <div class="divider" style="margin:4px 20px;"></div>

      <!-- Attendance -->
      <div class="sidebar-section svc-att">
        <div class="sidebar-label"><span class="svc-dot"
            style="background:#00ff88;display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;"></span>Attendance
          :8000</div>
        <button class="endpoint-btn" data-id="health-att" onclick="selectEndpoint(this)">
          <span class="method-badge GET">GET</span>
          <span class="endpoint-name">/health</span>
        </button>
        <button class="endpoint-btn" data-id="list-att" onclick="selectEndpoint(this)">
          <span class="method-badge GET">GET</span>
          <span class="endpoint-name">/api/v1/attendance</span>
        </button>
        <button class="endpoint-btn" data-id="create-att" onclick="selectEndpoint(this)">
          <span class="method-badge POST">POST</span>
          <span class="endpoint-name">/api/v1/attendance</span>
        </button>
        <button class="endpoint-btn" data-id="get-att" onclick="selectEndpoint(this)">
          <span class="method-badge GET">GET</span>
          <span class="endpoint-name">/api/v1/attendance/{id}</span>
        </button>
        <button class="endpoint-btn" data-id="update-att" onclick="selectEndpoint(this)">
          <span class="method-badge PUT">PUT</span>
          <span class="endpoint-name">/api/v1/attendance/{id}</span>
        </button>
        <button class="endpoint-btn" data-id="delete-att" onclick="selectEndpoint(this)">
          <span class="method-badge DELETE">DEL</span>
          <span class="endpoint-name">/api/v1/attendance/{id}</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main>
      <!-- Config bar -->
      <div class="config-bar">
        <label>BASE URL</label>
        <input id="base-url" type="text" value="http://localhost" placeholder="http://localhost"
          style="max-width:200px;">
        <label>TOKEN</label>
        <input id="global-token" type="text" class="token-input"
          placeholder="Bearer token (se rellena automáticamente tras login)">
      </div>

      <div class="content">
        <!-- Request panel -->
        <div class="panel" id="request-panel">
          <div class="panel-title">Request</div>

          <div id="request-content">
            <div class="empty-state">
              <div class="icon">⬅</div>
              <div>Selecciona un endpoint</div>
            </div>
          </div>
        </div>

        <!-- Response panel -->
        <div class="panel" id="response-panel">
          <div class="panel-title">Response</div>
          <div id="response-meta" class="response-meta"></div>
          <div id="response-body">
            <div class="empty-state">
              <div class="icon">📡</div>
              <div>Aquí aparecerá la respuesta</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ── Endpoint Definitions ──────────────────────────────────────────────
    const ENDPOINTS = {
      'health-auth': {
        method: 'GET', port: 8001, path: '/health',
        title: 'Auth Health Check', auth: false,
        fields: [],
        description: 'Verifica que el Auth Service esté corriendo.'
      },
      'login': {
        method: 'POST', port: 8001, path: '/auth/login',
        title: 'Login', auth: false,
        fields: [
          { id: 'email', label: 'Email', type: 'email', required: true, default: 'student1@example.com' },
          { id: 'password', label: 'Password', type: 'password', required: true, default: '123456' },
        ],
        body: (f) => ({ email: f.email, password: f.password }),
        description: 'Inicia sesión y obtiene access_token + refresh_token. El token se guarda automáticamente.',
        onSuccess: (data) => {
          const token = data.access_token || data.token;
          if (token) document.getElementById('global-token').value = 'Bearer ' + token;
        }
      },
      'refresh': {
        method: 'POST', port: 8001, path: '/auth/refresh',
        title: 'Refresh Token', auth: false,
        fields: [
          { id: 'refresh_token', label: 'Refresh Token', type: 'text', required: true, placeholder: 'Pega el refresh_token aquí' },
        ],
        body: (f) => ({ refresh_token: f.refresh_token }),
        description: 'Renueva el access_token usando el refresh_token.'
      },
      'logout': {
        method: 'POST', port: 8001, path: '/auth/logout',
        title: 'Logout', auth: true,
        fields: [
          { id: 'refresh_token', label: 'Refresh Token', type: 'text', required: true, placeholder: 'Pega el refresh_token aquí' }
        ],
        body: (f) => ({ refresh_token: f.refresh_token }),
        description: 'Invalida el refresh_token activo. Requiere Authorization header.'
      },

      // Users
      'health-user': {
        method: 'GET', port: 8002, path: '/health',
        title: 'User Health Check', auth: false,
        fields: []
      },
      'list-users': {
        method: 'GET', port: 8002, path: '/users',
        title: 'Listar Usuarios', auth: true,
        fields: [],
        description: 'Devuelve todos los usuarios registrados.'
      },
      'create-user': {
        method: 'POST', port: 8002, path: '/users',
        title: 'Crear Usuario', auth: true,
        fields: [
          { id: 'email', label: 'Email', type: 'email', required: true, default: 'nuevo@example.com' },
          { id: 'full_name', label: 'Nombre Completo', type: 'text', required: true, default: 'Juan Perez' },
          { id: 'role', label: 'Rol', type: 'select', options: ['student', 'teacher', 'admin'], default: 'student' },
        ],
        body: (f) => ({ email: f.email, full_name: f.full_name, role: f.role }),
        description: 'Crea un nuevo usuario en el sistema.'
      },
      'get-user': {
        method: 'GET', port: 8002, path: '/users/{id}',
        title: 'Obtener Usuario', auth: true,
        fields: [
          { id: 'id', label: 'User ID', type: 'text', required: true, placeholder: 'user-001' },
        ],
        pathParams: ['id'],

      'assign-role': {

      // Attendance
      'health-att': {

        title: 'Attendance Health Check', auth: false,
        fields: []
      },
      'list-att': {
        method: 'GET', port: 8000, path: '/api/v1/attendance',
        title: 'Listar Asistencias', auth: true,
        fields: [],
        description: 'Devuelve todos los registros de asistencia.'
      },
      'create-att': {
        method: 'POST', port: 8000, path: '/api/v1/attendance',
        title: 'Registrar Asistencia', auth: true,
        fields: [
          { id: 'student_id', label: 'Student ID', type: 'text', required: true, default: 'student-001' },

        ],
        body: (f) => {
          const b = { student_id: f.student_id, course_id: f.course_id, class_session_id: f.class_session_id };
          if (f.attendance_date) b.attendance_date = f.attendance_date;
          return b;
        },
        description: 'Registra la asistencia de un estudiante. Si supera el límite, se publica evento en RabbitMQ.'
      },
      'get-att': {
        method: 'GET', port: 8000, path: '/api/v1/attendance/{id}',
        title: 'Obtener Asistencia', auth: true,
        fields: [
          { id: 'id', label: 'Attendance ID', type: 'text', required: true, placeholder: 'att-001' },
        ],
        pathParams: ['id'],
        description: 'Obtiene un registro de asistencia por ID.'
      },
      'update-att': {
        method: 'PUT', port: 8000, path: '/api/v1/attendance/{id}',
        title: 'Actualizar Asistencia', auth: true,
        fields: [
          { id: 'id', label: 'Attendance ID', type: 'text', required: true, placeholder: 'att-001' },
          { id: 'student_id', label: 'Student ID', type: 'text', required: true, default: 'student-001' },
          { id: 'course_id', label: 'Course ID', type: 'text', required: true, default: 'MAT101' },
          { id: 'class_session_id', label: 'Class Session ID', type: 'text', required: true, default: 'CLASE-01' },
          { id: 'attendance_date', label: 'Fecha (YYYY-MM-DD)', type: 'text', required: true, default: new Date().toISOString().split('T')[0] },
        ],
        pathParams: ['id'],

      },
      'delete-att': {
        method: 'DELETE', port: 8000, path: '/api/v1/attendance/{id}',
        title: 'Eliminar Asistencia', auth: true,
        fields: [
          { id: 'id', label: 'Attendance ID', type: 'text', required: true, placeholder: 'att-001' },
        ],
        pathParams: ['id'],
        description: 'Elimina un registro de asistencia.'
      },
    };

    let currentEndpoint = null;

    function getBaseUrl(port) {
      const base = document.getElementById('base-url').value.replace(/\/$/, '');
      return `${base}:${port}`;
    }

    function buildUrl(endpoint) {
      let path = endpoint.path;
      if (endpoint.pathParams) {
        endpoint.pathParams.forEach(p => {
          const val = document.getElementById('field-' + p)?.value || `{${p}}`;
          path = path.replace(`{${p}}`, val);
        });
      }
      return getBaseUrl(endpoint.port) + path;
    }

    function selectEndpoint(btn) {
      document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const id = btn.dataset.id;
      currentEndpoint = ENDPOINTS[id];
      renderRequest(currentEndpoint);
      clearResponse();
    }

    function renderRequest(ep) {
      const panel = document.getElementById('request-content');
      const methodClass = ep.method;
      const url = getBaseUrl(ep.port) + ep.path;

      let fieldsHtml = '';
      ep.fields.forEach(f => {
        let input = '';
        const val = f.default || '';
        const ph = f.placeholder || '';
        const req = f.required ? '<span class="field-required">*</span>' : '';

        if (f.type === 'select') {
          const opts = f.options.map(o => `<option value="${o}" ${o === val ? 'selected' : ''}>${o}</option>`).join('');
          input = `<select id="field-${f.id}" onchange="updateUrlDisplay()">${opts}</select>`;
        } else if (f.type === 'textarea') {
          input = `<textarea id="field-${f.id}" placeholder="${ph}">${val}</textarea>`;
        } else {
          input = `<input id="field-${f.id}" type="${f.type}" value="${val}" placeholder="${ph}" oninput="updateUrlDisplay()">`;
        }

        fieldsHtml += `<div class="field-group">
        <label class="field-label">${f.label}${req}</label>
        ${input}
      </div>`;
      });

      const infoBox = ep.description ? `<div class="info-box">${ep.description}</div>` : '';
      const authNote = ep.auth ? `<div class="info-box" style="border-color:rgba(124,58,237,0.3);color:#a78bfa;">🔒 Requiere Authorization header. Usa el campo TOKEN de arriba.</div>` : '';

      panel.innerHTML = `
      ${infoBox}
      ${authNote}
      <div class="url-display">
        <span class="method-badge ${methodClass}">${ep.method}</span>
        <span id="url-preview">${url}</span>
      </div>
      ${fieldsHtml}
      <button class="btn-send" onclick="sendRequest()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">▶ ENVIAR REQUEST</span>
      </button>
    `;

      updateUrlDisplay();
    }

    function updateUrlDisplay() {
      if (!currentEndpoint) return;
      const el = document.getElementById('url-preview');
      if (el) el.textContent = buildUrl(currentEndpoint);
    }

    function clearResponse() {
      document.getElementById('response-meta').innerHTML = '';
      document.getElementById('response-body').innerHTML = `
      <div class="empty-state">
        <div class="icon">📡</div>
        <div>Aquí aparecerá la respuesta</div>
      </div>`;
    }

    async function sendRequest() {
      if (!currentEndpoint) return;
      const ep = currentEndpoint;

      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');
      const btn = document.querySelector('.btn-send');

      spinner.style.display = 'block';
      btnText.textContent = 'ENVIANDO...';
      btn.disabled = true;

      const url = buildUrl(ep);
      const headers = { 'Content-Type': 'application/json' };
      const token = document.getElementById('global-token').value.trim();
      if (ep.auth && token) headers['Authorization'] = token;

      let options = { method: ep.method, headers };
      if (ep.body && ep.method !== 'GET') {
        const fields = {};
        ep.fields.forEach(f => {
          const el = document.getElementById('field-' + f.id);
          if (el) fields[f.id] = el.value;
        });
        options.body = JSON.stringify(ep.body(fields));
      }

      const start = Date.now();
      let status = null, data = null, errMsg = null;

      try {
        const res = await fetch(url, options);
        status = res.status;
        const elapsed = Date.now() - start;

        try { data = await res.json(); } catch { data = await res.text(); }

        showResponse(status, elapsed, data);

        // Auto-capture token
        if (ep.onSuccess && res.ok) ep.onSuccess(data);

      } catch (e) {
        const elapsed = Date.now() - start;
        errMsg = e.message;
        showError(errMsg, elapsed);
      }

      spinner.style.display = 'none';
      btnText.textContent = '▶ ENVIAR REQUEST';
      btn.disabled = false;
    }

    function showResponse(status, elapsed, data) {
      const metaEl = document.getElementById('response-meta');
      const bodyEl = document.getElementById('response-body');

      let cls = 'status-2xx';
      if (status >= 400 && status < 500) cls = 'status-4xx';
      else if (status >= 500) cls = 'status-5xx';

      const statusText = { 200: 'OK', 201: 'Created', 204: 'No Content', 400: 'Bad Request', 401: 'Unauthorized', 403: 'Forbidden', 404: 'Not Found', 409: 'Conflict', 500: 'Internal Server Error' }[status] || '';

      metaEl.innerHTML = `
      <span class="status-badge ${cls}">${status} ${statusText}</span>
      <span class="response-time">⏱ ${elapsed}ms</span>
    `;

      const formatted = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      const highlighted = syntaxHighlight(formatted);
      bodyEl.innerHTML = `<div class="response-body">${highlighted}</div>`;

      // Token auto-copy hint
      if (typeof data === 'object' && data && (data.access_token || data.token)) {
        const t = data.access_token || data.token;
        bodyEl.innerHTML += `
        <div class="token-copy-area">
          <div class="token-copy-label">✓ Access Token detectado — guardado automáticamente</div>
          <div class="token-copy-value" onclick="copyToken(this)">${t.substring(0, 60)}...</div>
          <button class="btn-copy" onclick="copyToken(document.querySelector('.token-copy-value'))">Copiar token completo</button>
        </div>
      `;
        document.getElementById('global-token').value = 'Bearer ' + t;
      }
    }

    function showError(msg, elapsed) {
      document.getElementById('response-meta').innerHTML = `
      <span class="status-badge status-err">ERROR</span>
      <span class="response-time">⏱ ${elapsed}ms</span>
    `;
      document.getElementById('response-body').innerHTML = `
      <div class="response-body" style="color:var(--red);">
Error de conexión: ${msg}

Verifica que:
• Los servicios están corriendo (docker-compose up)
• El BASE URL es correcto
• CORS está habilitado en Flask
• El puerto ${currentEndpoint?.port} está accesible
      </div>`;
    }

    function syntaxHighlight(json) {
      return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
          let cls = 'json-number';
          if (/^"/.test(match)) cls = /:$/.test(match) ? 'json-key' : 'json-string';
          else if (/true|false/.test(match)) cls = 'json-bool';
          else if (/null/.test(match)) cls = 'json-null';
          return `<span class="${cls}">${match}</span>`;
        });
    }

    function copyToken(el) {
      const text = el.textContent;
      navigator.clipboard.writeText(text).catch(() => { });
    }

    // Auto-update URL when base changes
    document.getElementById('base-url').addEventListener('input', updateUrlDisplay);
  </script>
